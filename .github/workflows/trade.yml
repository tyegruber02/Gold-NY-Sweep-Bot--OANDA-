name: Congressional Trade Bot

on:
  schedule:
    - cron: '30 13 * * 1-5'  # 9:30 AM ET (UTC-4), Monday–Friday (market open)
    - cron: '30 19 * * 1-5'  # 3:30 PM ET (UTC-4), Monday–Friday (before market close)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil alpaca-py yfinance pandas python-dotenv

      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: |
            bot_state.json
            price_cache.json
          key: bot-state-${{ runner.os }}
          restore-keys: |
            bot-state-

      - name: Run bot
        env:
          QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python3 03_live_bot.py

      - name: Save bot state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            bot_state.json
            price_cache.json
          key: bot-state-${{ runner.os }}-${{ github.run_id }}
