name: Gold NY-Sweep Bot

on:
  # Run every hour during Asia session hours (22:00–06:00 UTC = 17:00–01:00 ET)
  # Also runs at 17:00 ET (21:00 UTC) to catch the session open
  schedule:
    - cron: '0 21,22,23,0,1,2,3,4,5,6 * * *'
  # Manual trigger from GitHub UI — useful for testing
  workflow_dispatch:

jobs:
  run-gold-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit state back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install oandapyV20 pandas numpy pytz

      - name: Run gold bot (single hourly check)
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          OANDA_ENV:        practice
          PAPER_MODE:       "true"
          ACCOUNT_SIZE:     "100000"
          RISK_HIGH:        "0.05"
          RISK_LOW:         "0.03"
        run: python3 gold_bot_runner.py

      - name: Commit gold bot state and trade log back to repo
        if: always()
        run: |
          git config user.name  "Gold Bot"
          git config user.email "bot@github-actions"
          git add gold_bot_state.json gold_trade_log.json || true
          git diff --cached --quiet || git commit -m "gold-bot: state + trades $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
