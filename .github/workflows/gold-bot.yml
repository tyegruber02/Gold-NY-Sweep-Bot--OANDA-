name: Gold NY-Sweep Bot (OANDA)

on:
  # Every hour during Asia session (22:00–06:00 UTC = 17:00–01:00 ET)
  schedule:
    - cron: '0 21,22,23,0,1,2,3,4,5,6 * * *'
  workflow_dispatch:

jobs:
  run-gold-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install oandapyV20 pandas numpy pytz

      - name: Run gold bot
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          OANDA_ENV:        practice
          GOLD_PAPER_MODE:  "true"
          ACCOUNT_SIZE:     "100000"
          RISK_HIGH:        "0.05"
          RISK_LOW:         "0.03"
        run: python3 gold_bot.py

      - name: Commit state and trade log
        if: always()
        run: |
          git config user.name  "Gold Bot"
          git config user.email "bot@github-actions"
          git add gold_bot_state.json gold_trade_log.json || true
          git diff --cached --quiet || git commit -m "gold-bot: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push || true
